# fly.toml app configuration file generated for cool-planes-bot on 2026-04-30T11:43:43Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'cool-planes-bot'
primary_region = 'cdg'

[build]

[processes]
  app = 'node dist/index.js'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
